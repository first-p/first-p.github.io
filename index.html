<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austin Community College Pickleball Club</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to the CSS file -->
</head>
<body>
    <header style="background-color: #4B0082;"> <!-- Adjust the color to 
match the screenshot -->
        <img src="logo.png" alt="Austin Community College Logo" 
id="acc-logo"> <!-- Use the actual path to the logo image -->
    </header>

    <main>
        <h1 class="centered-title" style="background-color: #4B0082; 
color: white;">Welcome to the Austin Community College Pickleball 
Club!</h1>
        <img src="ACCPC.png" alt="Pickleball Play" class="centered-img"> 
<!-- Use the actual path to the pickleball image -->
        <div class="club-description">
            <!-- Description text goes here, as provided in the previous 
prompt -->
        </div>
        <div class="signup-section">
            <h2 class="signup-title">Sign Up Today!</h2>
            <a href="https://forms.gle/jfX7m7A3apFtjR9T6" 
class="signup-button" style="background-color: #4B0082; color: 
white;">Sign Up</a>
        </div>
        <section class="how-to-play">
            <h2 class="centered-heading">How to Play Pickleball</h2>
            <iframe width="560" height="315" 
src="https://www.youtube.com/embed/JMwKyO4-WYU?start=26" frameborder="0" 
allow="accelerometer; autoplay; clipboard-write; encrypted-media; 
gyroscope; picture-in-picture" allowfullscreen 
class="centered-video"></iframe>
        </section>
    </main>

    <footer style="background-color: #4B0082; color: white;">
        <img src="logo.png" alt="Austin Community College Logo" 
class="footer-logo"> <!-- Use the actual path to the logo image -->
        <address>
            Austin Community College District<br>
            6101 Highland Campus Drive<br>
            Austin, Texas 78752-4390<br>
            512-223-7000
        </address>
    </footer>

    <script src="script.js"></script> <!-- Link to the JavaScript file -->
</body>
</html>
